name: Build iOS (Device)

# Builds a production IPA using raw xcodebuild on a macOS runner. No EAS, no
# Expo credentials, no signing — the .app is built with CODE_SIGNING_ALLOWED=NO
# and wrapped in a standard Payload/Multica.app → .ipa structure.
#
# Download the artifact and sign it with your own identity:
#   codesign -f -s "<identity>" --entitlements <path> Payload/Multica.app
#   zip -r multica-signed.ipa Payload/

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build variant
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Prebuild native project
        working-directory: apps/mobile
        env:
          APP_ENV: ${{ inputs.profile == 'staging' && 'staging' || 'production' }}
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods dependencies
        working-directory: apps/mobile/ios
        run: pod install

      - name: Detect Xcode workspace and scheme
        working-directory: apps/mobile
        run: |
          # The workspace FILENAME is the reliable identifier — Expo names the
          # workspace + scheme after the app name ("Multica"). Deriving the
          # scheme from the workspace basename avoids grabbing a dependency
          # scheme (e.g. "boost" injected by buildReactNativeFromSource) that
          # has no matching .xcworkspace and makes xcodebuild fail to open it.
          WORKSPACE=$(ls -d ios/*.xcworkspace 2>/dev/null | grep -vi pods | head -1)
          if [ -z "$WORKSPACE" ]; then
            echo "::error::No .xcworkspace found under ios/"; exit 1
          fi
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "WORKSPACE=${WORKSPACE}" >> "$GITHUB_ENV"
          echo "SCHEME=${SCHEME}" >> "$GITHUB_ENV"

      - name: Build .app (unsigned)
        working-directory: apps/mobile
        env:
          APP_ENV: ${{ inputs.profile == 'staging' && 'staging' || 'production' }}
        run: |
          xcodebuild \
            -workspace "${WORKSPACE}" \
            -scheme "${SCHEME}" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            clean build

      - name: Package IPA
        run: |
          SCHEME="${SCHEME:-Multica}"
          mkdir -p Payload
          cp -R "apps/mobile/build/Build/Products/Release-iphoneos/${SCHEME}.app" \
            "Payload/${SCHEME}.app"
          cd Payload && zip -r ../multica.ipa . && cd ..
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: multica-ios-unsigned
          path: multica.ipa
          if-no-files-found: error
          retention-days: 7
