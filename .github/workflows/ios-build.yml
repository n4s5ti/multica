name: Build iOS (Device)

# Builds a production IPA using xcodebuild archive on a macOS runner. No EAS,
# no Expo credentials, no signing — the .app is archived with
# CODE_SIGNING_ALLOWED=NO and wrapped in a standard Payload/<scheme>.app → .ipa
# structure. The ARCHIVED .app is what sideload/sign services (AltStore,
# Sideloadly, Signulous) can re-sign; a raw `xcodebuild build` .app frequently
# fails to sign, so we archive instead of build.
#
# Download the artifact and sign it with your own identity:
#   codesign -f -s "<identity>" --entitlements <path> Payload/Multica.app
#   zip -r multica-signed.ipa Payload/

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build variant
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Prebuild native project
        working-directory: apps/mobile
        env:
          APP_ENV: ${{ inputs.profile == 'staging' && 'staging' || 'production' }}
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods dependencies
        working-directory: apps/mobile/ios
        run: pod install

      - name: Pin Xcode (latest)
        # macos-latest ships multiple Xcodes; without a pin, the runner picks
        # non-deterministically. expo-modules-core's Swift sources fail to
        # compile under older Xcode (e.g. 16.4: "unknown attribute 'MainActor'",
        # Sendable violations) but succeed on the latest (26.x). Pin to latest
        # so archive/build are reproducible and signable.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Detect Xcode workspace and scheme
        working-directory: apps/mobile
        run: |
          # The workspace FILENAME is the reliable identifier — Expo names the
          # workspace + scheme after the app name ("Multica"). Deriving the
          # scheme from the workspace basename avoids grabbing a dependency
          # scheme (e.g. "boost" injected by buildReactNativeFromSource) that
          # has no matching .xcworkspace and makes xcodebuild fail to open it.
          WORKSPACE=$(ls -d ios/*.xcworkspace 2>/dev/null | grep -vi pods | head -1)
          if [ -z "$WORKSPACE" ]; then
            echo "::error::No .xcworkspace found under ios/"; exit 1
          fi
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "WORKSPACE=${WORKSPACE}" >> "$GITHUB_ENV"
          echo "SCHEME=${SCHEME}" >> "$GITHUB_ENV"

      - name: Archive .app (unsigned)
        # `archive` (not plain `build`) yields a distribution-ready .app inside
        # an .xcarchive that sideload/sign services can re-sign. Plain `build`
        # .app frequently fails to sign. Kept unsigned (CODE_SIGNING_ALLOWED=NO)
        # for the user to sign with their own identity.
        working-directory: apps/mobile
        env:
          APP_ENV: ${{ inputs.profile == 'staging' && 'staging' || 'production' }}
        run: |
          xcodebuild clean archive \
            -workspace "${WORKSPACE}" \
            -scheme "${SCHEME}" \
            -configuration Release \
            -archivePath "build/${SCHEME}.xcarchive" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package IPA
        run: |
          SCHEME="${SCHEME:-Multica}"
          mkdir -p Payload
          cp -R "apps/mobile/build/${SCHEME}.xcarchive/Products/Applications/${SCHEME}.app" \
            "Payload/${SCHEME}.app"
          cd Payload && zip -r ../multica.ipa . && cd ..
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: multica-ios-unsigned
          path: multica.ipa
          if-no-files-found: error
          retention-days: 7
